{% extends "base.html" %}

{% block content %}

<style>
    .signin-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        padding: 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 18px;
        padding: 40px;
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.12);
        animation: fadeIn 0.5s ease-in-out;
        text-align: center;
    }

    .auth-card h2 {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 10px;
    }

    .auth-card p {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 25px;
        line-height: 1.5;
    }

    .auth-card input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 18px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        outline: none;
        transition: all 0.25s ease;
        background: #f9fafb;
    }

    .auth-card input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        background: #fff;
    }

    .auth-card button {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px rgba(34, 197, 94, 0.25);
    }

    .auth-card button:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(34, 197, 94, 0.35);
    }

    .auth-footer {
        margin-top: 18px;
        font-size: 13px;
        color: #64748b;
    }

    .auth-footer a {
        color: #22c55e;
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(12px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="signin-page">
    <div class="auth-card">

        <h2>Reset Your Password 🔐</h2>

        <p>
            No worries — it happens. Enter your email and we’ll send you a secure link to reset your password.
        </p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="email" name="email" placeholder="Enter your email address" required>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            Remembered it?
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>

    </div>
</div>

{% endblock %}
