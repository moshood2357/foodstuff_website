<section class="hero-section pt-0 pb-5 bg-white border-bottom">
    <div class="container">
        <div class="row align-items-center g-5 py-5">

            <!-- TEXT SIDE -->
            <div class="col-lg-6 hero-text">

                <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill mb-3">
                    Fresh Foodstuff Delivered Daily
                </span>

                <h1 class="display-5 fw-bold mb-3">
                    Fresh Groceries Delivered Straight to Your Door
                </h1>

                <p class="lead text-muted mb-4">
                    Shop rice, beans, vegetables, oils, spices, and everyday essentials at affordable prices.
                    Fast delivery. Trusted quality. Maximum convenience.
                </p>

                <div class="d-flex flex-wrap gap-3 mb-4">
                    <a href="{{ url_for('main.shop') }}" class="btn btn-success btn-lg rounded-pill px-4">
                        Shop Now
                    </a>

                    <a href="{{ url_for('main.about') }}" class="btn btn-outline-dark btn-lg rounded-pill px-4">
                        Learn More
                    </a>
                </div>

                <!-- STATS -->
                <div class="row g-4 mt-2">
                    <div class="col-4">
                        <h5 class="fw-bold text-success mb-1">10k+</h5>
                        <small class="text-muted">Customers</small>
                    </div>

                    <div class="col-4">
                        <h5 class="fw-bold text-success mb-1">500+</h5>
                        <small class="text-muted">Products</small>
                    </div>

                    <div class="col-4">
                        <h5 class="fw-bold text-success mb-1">24/7</h5>
                        <small class="text-muted">Support</small>
                    </div>
                </div>

            </div>

            <!-- IMAGE SIDE -->
            <div class="col-lg-6">
                <div class="hero-image text-center hero-image">

                    <img src="{{ url_for('static', filename='images/grocery.png') }}" alt="Fresh Foodstuff"
                        class="img-fluid hero-img">

                </div>
            </div>

        </div>
    </div>
</section>
