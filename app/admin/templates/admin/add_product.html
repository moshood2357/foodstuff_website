{% extends "base.html" %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm border-0 rounded-4 p-4">

                <h3 class="mb-4">Add New Product</h3>

                <form method="POST" enctype="multipart/form-data">
                
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                    <input type="text" name="name" class="form-control mb-3" placeholder="Product Name" required>
                
                    <textarea name="description" class="form-control mb-3" placeholder="Full Description"></textarea>
                
                    <input type="text" name="short_description" class="form-control mb-3" placeholder="Short Description">
                
                    <input type="number" name="price" class="form-control mb-3" placeholder="Price" required>
                
                    <input type="number" name="stock_quantity" class="form-control mb-3" placeholder="Stock Quantity" required>

                    <select name="category_id" class="form-select mb-3" required>
                        <option value="">Select Category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                
                    <input type="file" name="image" class="form-control mb-3" required>
                
                    <button class="btn btn-success w-100 rounded-pill">
                        Add Product
                    </button>         
                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
